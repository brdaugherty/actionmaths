<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galton Board Simulator</title>
    <meta name="copyright" content="© 2025 Brian Daugherty. All rights reserved.">

    <link rel="icon" href="data:;base64,iVBORw0KGgo=">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
            overflow-x: hidden; /* Prevents horizontal scrollbars */
        }

        canvas {
            background-color: #1a202c; /* dark-900 */
            border-radius: 0.5rem;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
        }

        .bucket-counter {
            transition: background-color 0.3s ease, transform 0.2s ease;
            transform-origin: bottom center;
        }

        /* Heatmap Colors */
        .bucket-counter.heatmap-red { background-color: #e53e3e; }
        .bucket-counter.heatmap-yellow { background-color: #d69e2e; }
        .bucket-counter.heatmap-green { background-color: #38a169; }

        .bucket-counter.highlight {
            background-color: #4299e1 !important; /* blue-400 */
            transform: scale(1.1);
            z-index: 10;
        }
    </style>
</head>

<body class="bg-gray-900 text-white flex flex-col items-center justify-center min-h-screen p-4">

    <div class="w-full max-w-4xl mx-auto text-center">
        <h1 class="text-3xl md:text-4xl font-bold text-blue-400 mb-2">Galton Board Simulator</h1>
        <p class="text-lg text-gray-400 mb-2">Press the <kbd class="px-2 py-1.5 text-xs font-semibold text-gray-800 bg-gray-100 border border-gray-200 rounded-lg">Spacebar</kbd> or tap the board to drop a ball.</p>
        <p class="text-lg text-gray-300 mb-6">Total Balls In Buckets: <span id="totalCounter" class="font-bold text-blue-300">0</span></p>
    </div>

    <!-- Game Container wrapper for proper scaling -->
    <div id="game-container" style="position: relative; transform-origin: top center; width: 800px; height: 750px;">
        <!-- Canvas for the Galton Board animation -->
        <canvas id="galtonBoard" style="width: 800px; height: 750px; display: block;"></canvas>

        <!-- Container for the bucket counters overlaying the canvas -->
        <div id="bucketCounters" style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none;"></div>
    </div>

    <script>
        // --- Canvas and Context Setup ---
        const canvas = document.getElementById('galtonBoard');
        const ctx = canvas.getContext('2d');
        const gameContainer = document.getElementById('game-container');
        
        // Logical canvas size
        const CANVAS_WIDTH = 800;
        const CANVAS_HEIGHT = 750;

        function setupCanvasForHighDPI() {
            const dpr = window.devicePixelRatio || 1;
            canvas.width = CANVAS_WIDTH * dpr;
            canvas.height = CANVAS_HEIGHT * dpr;
            ctx.scale(dpr, dpr);
        }

        // --- Configuration ---
        const DEPTH = 10; // Number of peg rows
        const PEG_RADIUS = 5;
        const BALL_RADIUS = 7;
        const VERTICAL_SPACING = 60; // Vertical distance between rows
        const HORIZONTAL_SPACING = 2 * VERTICAL_SPACING * Math.tan(Math.PI / 6); // tan(30 degrees)
        // Animation duration reduced by 1/3 from 500ms to make it faster
        const ANIMATION_DURATION = 333; // ~0.33 seconds per level drop

        // --- State Management ---
        let pegs = [];
        let buckets = [];
        let balls = [];
        // --- V2.0 MULTI-VECTOR APPROACH (HILBERT SPACE) ---
        // The universe runs on a single mathematical engine: Linear Algebra acting on a Hilbert Space.
        // The physics we observe is dictated by the dimensionality (N) of the State Vector.
        // For the Galton Board (Classical Physics), N is extremely low. We only need enough 
        // dimensions to track the scalar count/probability for each bucket. Phase/interference cannot exist here.
        const STATE_VECTOR_SIZE = DEPTH + 1;
        const stateVector = new Float32Array(STATE_VECTOR_SIZE); 
        // --------------------------------------------------

        let bucketProbabilities = new Array(DEPTH + 1).fill(0);
        let bucketFreqHz = new Array(DEPTH + 1).fill(440); // 440 Hz (A4)
        let totalBallsDropped = 0; // Counter for total balls

        // --- Utility Functions ---
        function getBinomialProbability(n, k) {
            let coeff = 1;
            for (let i = 1; i <= k; i++) {
                coeff = coeff * (n - i + 1) / i;
            }
            return coeff * Math.pow(0.5, n);
        }

        /**
         * Draws a circle on the canvas.
         * @param {number} x - The x-coordinate of the circle's center.
         * @param {number} y - The y-coordinate of the circle's center.
         * @param {number} radius - The radius of the circle.
         * @param {string} color - The fill color of the circle.
         */
        function drawCircle(x, y, radius, color) {
            ctx.beginPath();
            ctx.arc(x, y, radius, 0, Math.PI * 2);
            ctx.fillStyle = color;
            ctx.fill();
            ctx.closePath();
        }

        /**
         * Sets up the positions for pegs and buckets.
         */
        function setupBoard() {
            pegs = [];
            
            // Calculate binomial probabilities for the ideal distribution
            for (let i = 0; i <= DEPTH; i++) {
                bucketProbabilities[i] = getBinomialProbability(DEPTH, i);
            }
            const topOffset = 80; // Starting Y position for the first peg

            // Calculate peg positions (Pascal's Triangle layout)
            for (let row = 0; row < DEPTH; row++) {
                const rowPegs = [];
                const rowWidth = row * HORIZONTAL_SPACING;
                const startX = (CANVAS_WIDTH - rowWidth) / 2;
                for (let col = 0; col <= row; col++) {
                    const x = startX + col * HORIZONTAL_SPACING;
                    const y = topOffset + row * VERTICAL_SPACING;
                    rowPegs.push({
                        x,
                        y
                    });
                }
                pegs.push(rowPegs);
            }

            // Calculate bucket positions
            buckets = [];
            const bucketRowY = topOffset + DEPTH * VERTICAL_SPACING + 20;
            const bucketRowWidth = DEPTH * HORIZONTAL_SPACING;
            const startBucketX = (CANVAS_WIDTH - bucketRowWidth) / 2;
            for (let i = 0; i <= DEPTH; i++) {
                buckets.push({
                    x: startBucketX + i * HORIZONTAL_SPACING,
                    y: bucketRowY,
                    width: HORIZONTAL_SPACING * 0.8,
                    height: 50
                });
            }
            setupBucketCounters();
        }

        /**
         * Creates and initializes the counter display elements over the canvas.
         */
        function setupBucketCounters() {
            const countersContainer = document.getElementById('bucketCounters');
            countersContainer.innerHTML = ''; // Clear existing counters
            for (let index = 0; index < stateVector.length; index++) {
                const count = stateVector[index];
                const counterDiv = document.createElement('div');
                // Absolute positioned over the canvas bucket coordinates
                counterDiv.className = 'bucket-counter bg-gray-700 text-white font-bold rounded-t-lg absolute flex items-center justify-center text-sm';
                
                const bucket = buckets[index];
                counterDiv.style.width = `${bucket.width}px`;
                counterDiv.style.height = `${bucket.height}px`;
                counterDiv.style.left = `${bucket.x - bucket.width / 2}px`;
                counterDiv.style.top = `${bucket.y}px`;
                
                counterDiv.id = `bucket-${index}`;
                counterDiv.textContent = count;
                countersContainer.appendChild(counterDiv);
            }
        }

        /**
         * Draws the entire board: pegs and buckets.
         */
        function drawBoard() {
            // Draw statistical chart overlay
            if (totalBallsDropped > 0) {
                const maxExpected = Math.max(...bucketProbabilities) * totalBallsDropped;
                const maxActual = Math.max(...stateVector);
                const maxScaleValue = Math.max(maxExpected, maxActual, 1);
                const maxBarHeight = 300; // Max height for the overlay bars

                // Draw actual result bars
                ctx.fillStyle = 'rgba(66, 153, 225, 0.5)'; // Semi-transparent blue
                buckets.forEach((bucket, i) => {
                    const barHeight = (stateVector[i] / maxScaleValue) * maxBarHeight;
                    // Draw upwards from the top of the bucket
                    ctx.fillRect(bucket.x - bucket.width / 2, bucket.y - barHeight, bucket.width, barHeight);
                });

                // Draw expected ghost curve (smoothed)
                ctx.beginPath();
                ctx.strokeStyle = 'rgba(255, 255, 255, 0.8)'; // Glowing white curve
                ctx.lineWidth = 3;
                
                const points = buckets.map((bucket, i) => {
                    const expectedCount = bucketProbabilities[i] * totalBallsDropped;
                    return {
                        x: bucket.x,
                        y: bucket.y - (expectedCount / maxScaleValue) * maxBarHeight
                    };
                });

                if (points.length > 0) {
                    ctx.moveTo(points[0].x, points[0].y);
                    for (let i = 0; i < points.length - 1; i++) {
                        const p0 = i > 0 ? points[i - 1] : points[0];
                        const p1 = points[i];
                        const p2 = points[i + 1];
                        const p3 = i !== points.length - 2 ? points[i + 2] : p2;

                        const cp1x = p1.x + (p2.x - p0.x) / 6;
                        const cp1y = p1.y + (p2.y - p0.y) / 6;

                        const cp2x = p2.x - (p3.x - p1.x) / 6;
                        const cp2y = p2.y - (p3.y - p1.y) / 6;

                        ctx.bezierCurveTo(cp1x, cp1y, cp2x, cp2y, p2.x, p2.y);
                    }
                }
                ctx.stroke();
            }

            // Draw pegs
            ctx.fillStyle = '#90cdf4'; // light-blue-300
            pegs.forEach(row => {
                row.forEach(peg => {
                    drawCircle(peg.x, peg.y, PEG_RADIUS, '#90cdf4');
                });
            });

            // The buckets are now HTML elements overlaid on the canvas,
            // so we no longer need to draw the gray rectangles here!
        }

        /**
         * Creates a new ball at the top of the board and starts its journey.
         */
        function releaseBall() {
            const startPeg = pegs[0][0];
            const newBall = {
                startX: startPeg.x,
                startY: startPeg.y - VERTICAL_SPACING, // Start above the first peg
                targetX: startPeg.x,
                targetY: startPeg.y,
                x: startPeg.x,
                y: startPeg.y - VERTICAL_SPACING,
                row: 0,
                col: 0,
                startTime: Date.now(),
                color: '#e2e8f0' // Silver color (tailwind gray-200)
            };
            balls.push(newBall);
        }

        /**
         * Play a sound when a ball lands in a bucket, lower tones near the mean
	 * and higher tones further from the middle of the board.
         */
        function playTone(finalCol) {

            // Create an oscillator node
            const oscillator = audioContext.createOscillator();

            // Set the oscillator type (e.g., 'sine', 'square', 'sawtooth', 'triangle')
            oscillator.type = 'triangle';

            // Set the frequency of the tone in Hz
            let freqHz = bucketFreqHz[finalCol];
            oscillator.frequency.setValueAtTime(freqHz, audioContext.currentTime);

            // Connect the oscillator to the audio output (speakers)
            oscillator.connect(audioContext.destination);

            // Start the oscillator to play tone
            oscillator.start();

            // Stop the oscillator after N milliseconds
            const msDuration = 100
            setTimeout(() => {
                oscillator.stop();
            }, msDuration);
        }

        /**
         * Updates the state and position of all active balls.
         * This function contains the corrected logic.
         */
        function updateBalls() {
            // Iterate backwards to safely remove items from the array while looping.
            for (let i = balls.length - 1; i >= 0; i--) {
                const ball = balls[i];
                const elapsedTime = Date.now() - ball.startTime;
                const progress = Math.min(elapsedTime / ANIMATION_DURATION, 1);

                // Linear interpolation for smooth movement
                ball.x = ball.startX + (ball.targetX - ball.startX) * progress;
                ball.y = ball.startY + (ball.targetY - ball.startY) * progress;

                // When the ball's animation for the current step is complete
                if (progress >= 1) {
                    // Case 1: The ball was falling into a bucket and has now landed.
                    if (ball.row === DEPTH) {
                        const finalCol = ball.finalBucketIndex; // Use the stored bucket index
                        if (finalCol !== undefined) {
                            stateVector[finalCol]++;
                            totalBallsDropped++;
                            updateCounter(finalCol);
                            document.getElementById('totalCounter').textContent = totalBallsDropped;
                            updateHeatmap();

                            playTone(finalCol);
                        }
                        balls.splice(i, 1); // Remove the ball from the simulation
                    }
                    // Case 2: The ball just hit the last row of pegs.
                    else if (ball.row === DEPTH - 1) {
                        // Decide the final turn and set up the fall into a bucket.
                        const goRight = Math.random() < 0.5;
                        const finalCol = ball.col + (goRight ? 1 : 0);

                        ball.startX = ball.targetX;
                        ball.startY = ball.targetY;
                        ball.targetX = buckets[finalCol].x;
                        ball.targetY = buckets[finalCol].y + buckets[finalCol].height - BALL_RADIUS;
                        ball.startTime = Date.now();

                        // Set a flag (row=DEPTH) and store the final destination.
                        ball.row = DEPTH;
                        ball.finalBucketIndex = finalCol;
                    }
                    // Case 3: The ball hit a regular peg.
                    else {
                        // Move to the next peg in the triangle.
                        ball.row++;
                        const goRight = Math.random() < 0.5;
                        if (goRight) {
                            ball.col++;
                        }

                        ball.startX = ball.targetX;
                        ball.startY = ball.targetY;

                        const nextPeg = pegs[ball.row][ball.col];
                        ball.targetX = nextPeg.x;
                        ball.targetY = nextPeg.y;
                        ball.startTime = Date.now();
                    }
                }
            }
        }

        /**
         * Updates the display of a single bucket counter and adds a highlight effect.
         * @param {number} index - The index of the bucket to update.
         */
        function updateCounter(index) {
            const counterEl = document.getElementById(`bucket-${index}`);
            if (counterEl) {
                counterEl.textContent = stateVector[index];
                counterEl.classList.add('highlight');
                
                // Clear existing timeout to prevent jittering during rapid ball drops
                if (counterEl.dataset.timeoutId) {
                    clearTimeout(Number(counterEl.dataset.timeoutId));
                }
                
                // Remove the highlight after a short delay to create a flash effect
                const timeoutId = setTimeout(() => {
                    counterEl.classList.remove('highlight');
                }, 150); // Faster snap back
                
                counterEl.dataset.timeoutId = timeoutId;
            }
        }

        /**
         * Updates the heatmap colors of all buckets based on Z-score.
         */
        function updateHeatmap() {
            if (totalBallsDropped < 10) return; // Need a minimum sample size
            
            for (let i = 0; i <= DEPTH; i++) {
                const actual = stateVector[i];
                const p = bucketProbabilities[i];
                const expected = p * totalBallsDropped;
                const variance = totalBallsDropped * p * (1 - p);
                const sigma = Math.sqrt(variance);
                
                let zScore = 0;
                if (sigma > 0) {
                    zScore = Math.abs(actual - expected) / sigma;
                }
                
                const counterEl = document.getElementById(`bucket-${i}`);
                if (counterEl) {
                    counterEl.classList.remove('heatmap-red', 'heatmap-yellow', 'heatmap-green');
                    if (zScore < 1) {
                        counterEl.classList.add('heatmap-green');
                    } else if (zScore < 2) {
                        counterEl.classList.add('heatmap-yellow');
                    } else {
                        counterEl.classList.add('heatmap-red');
                    }
                }
            }
        }

        /**
         * The main animation loop.
         */
        function animate() {
            ctx.clearRect(0, 0, CANVAS_WIDTH, CANVAS_HEIGHT); // Clear canvas
            drawBoard();
            updateBalls();
            // Draw balls after updating their positions
            balls.forEach(ball => {
                drawCircle(ball.x, ball.y, BALL_RADIUS, ball.color);
            });
            requestAnimationFrame(animate); // Loop
        }

        // --- Event Listeners ---
        function handleInteraction() {
            if (audioContext && audioContext.state === 'suspended') {
                audioContext.resume();
            }
            releaseBall();
        }

        window.addEventListener('keydown', (e) => {
            if (e.code === 'Space') {
                e.preventDefault(); // Prevent default spacebar action (e.g., scrolling)
                handleInteraction();
            }
        });

        // Add pointerdown to the game container for mobile tap support
        gameContainer.addEventListener('pointerdown', (e) => {
            e.preventDefault();
            handleInteraction();
        });

        // Handle window resizing
        function onResize() {
            // Find the header to subtract its height from available screen space
            const header = document.querySelector('.max-w-4xl.text-center');
            const headerHeight = header ? header.offsetHeight : 150;
            
            const paddingX = 32; // 16px padding on each side
            const paddingY = 32; // 16px padding top and bottom from body p-4
            
            const availableWidth = Math.min(window.innerWidth, document.documentElement.clientWidth) - paddingX;
            const availableHeight = window.innerHeight - headerHeight - paddingY;
            
            // Since buckets are overlaid, container height is exactly canvas height
            const originalHeight = CANVAS_HEIGHT;
            
            // Calculate scale constraints for both width and height to ensure it fits entirely on screen
            const scaleWidth = availableWidth / CANVAS_WIDTH;
            const scaleHeight = availableHeight / originalHeight;
            const scale = Math.max(0.1, Math.min(scaleWidth, scaleHeight, 1));
            
            gameContainer.style.transform = `scale(${scale})`;
            
            // Adjust margin bottom so the scaled down container doesn't leave huge empty space
            gameContainer.style.marginBottom = `${(originalHeight * scale) - originalHeight}px`;
        }
        window.addEventListener('resize', onResize);

        // Create an AudioContext
        const audioContext = new(window.AudioContext || window.webkitAudioContext)();

	// Increase the tone when a ball falls in a bucket further from the mean
	let freqHz = 1040;
        for (let i = 0; i <= DEPTH / 2; i++) {
	    bucketFreqHz[i] = freqHz;
	    bucketFreqHz[DEPTH - i] = freqHz;
            freqHz -= 140;
        }

        // --- Initialization ---
        setupCanvasForHighDPI();
        setupBoard();
        onResize();
        // Call onResize again after layout has settled to ensure correct originalHeight
        setTimeout(onResize, 0);
        animate();
    </script>
</body>

</html>
